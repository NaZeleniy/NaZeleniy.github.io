<body x-data="collections()" x-init="fetchCollections()">

  <div class="bg-poster"
       :style="bgPoster ? 'background-image: url(' + bgPoster + ')' : ''"
       :class="{ visible: bgPoster }"></div>

  <div id="app-sidebar"></div>

  <main class="main-content">

    <!-- ══ Индекс подборок ══════════════════════════════ -->
    <div x-show="view === 'index'" x-transition>

      <div class="collections-head">
        <h1>Подборки</h1>
        <p>Тематические коллекции фильмов и сериалов</p>
      </div>

      <div class="loading-spinner" x-show="loading" x-transition>
        <i class="ph ph-circle-notch nz-spin"></i>
      </div>

      <div class="collections-grid" x-show="!loading && list.length > 0" x-transition>
        <template x-for="c in list" :key="c.slug">
          <button type="button" class="collection-card" @click="open(c)">
            <div class="collection-cover">
              <template x-for="(p, i) in covers(c)" :key="i">
                <img :src="p" alt="" loading="eager" @load="$el.classList.add('loaded')" @error="$el.src='img/placeholder.svg'; $el.classList.add('loaded')">
              </template>
            </div>
            <div class="collection-body">
              <span class="collection-name" x-text="c.name"></span>
              <span class="collection-desc" x-text="c.description"></span>
            </div>
          </button>
        </template>
      </div>

      <div class="empty-state" x-show="!loading && list.length === 0" x-transition>
        <i class="ph ph-stack"></i>
        <p x-text="loadError || 'Подборки появятся позже'"></p>
      </div>

    </div>

    <!-- ══ Детальный просмотр подборки ══════════════════ -->
    <div x-show="view === 'detail'" x-transition>

      <button type="button" class="person-back person-back-top" @click="back()">
        <i class="ph ph-arrow-left"></i> Назад
      </button>

      <div class="collection-detail-head">
        <div class="collection-detail-title">
          <h1 x-text="active ? active.name : ''"></h1>
          <span x-text="active ? active.description : ''"></span>
        </div>
      </div>

      <div class="loading-spinner" x-show="detailLoading" x-transition>
        <i class="ph ph-circle-notch nz-spin"></i>
      </div>

      <div class="grid" x-show="!detailLoading && movies.length > 0" x-transition>
        <template x-for="(movie, i) in movies" :key="'cm' + (movie.kinopoiskId || movie.filmId || i)">
          <a class="movie-card" :href="'/movie/' + (movie.kinopoiskId || movie.filmId)" @mouseenter="onCardEnter(movie)" @click="sessionStorage.setItem('moviePreview', JSON.stringify(movie))">
            <div class="movie-poster-container">
              <img class="movie-poster" :src="posterFor(movie)" :alt="movie.nameRu || movie.nameEn || 'Постер'" loading="lazy" @load="$el.classList.add('loaded')" @error="$el.src='img/placeholder.svg'; $el.classList.add('loaded')">
            </div>
            <template x-if="cardRating(movie) > 0">
              <div class="movie-badge-rating" :style="`background:${ratingBg(cardRating(movie))}`">
                <span x-text="cardRating(movie).toFixed(1)"></span>
              </div>
            </template>
            <div class="movie-badge-type" x-text="movieType(movie)"></div>
            <div class="movie-info">
              <h3 class="movie-title" x-text="movie.nameRu || movie.nameEn || movie.nameOriginal || 'Без названия'"></h3>
              <span class="movie-original-title" x-show="origTitle(movie)" x-text="origTitle(movie)"></span>
              <span class="movie-year" x-text="movie.year || ''"></span>
            </div>
          </a>
        </template>
      </div>

      <div class="empty-state" x-show="!detailLoading && movies.length === 0" x-transition>
        <i class="ph ph-film-strip"></i>
        <p>В этой подборке пока нет фильмов</p>
      </div>

      <div class="load-more-spinner" x-show="loadingMore" x-cloak x-transition>
        <i class="ph ph-circle-notch nz-spin"></i>
      </div>

      <div id="scroll-sentinel"></div>

    </div>

  </main>

  <script src="js/header.js?v=1782637567"></script>
  <script>renderHeader('collections')</script>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
