<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="js/version.js?v=1775877088"></script>
  <meta charset="UTF-8"/>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://nazeleniy.mooo.com">
  <link rel="dns-prefetch" href="https://sync.videoframe2.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000"/>
  <title>Совместный просмотр — NaZeleniy</title>
  <link rel="icon" type="image/png" href="img/icons/favicon.png"/>
  <link rel="preload" href="css/style-party.css?v=1775877088" as="style">
  <link rel="stylesheet" href="css/style-party.css?v=1775877088"/>
  <link rel="stylesheet" href="css/icons.css?v=1775877088"/>
  <style>
    .watch-party-ui,
    .wp-notification,
    [class^="wp-"],
    [class*=" wp-"] {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body>

  <div id="app-sidebar"></div>

  <div class="party-page">

    <div class="party-header">
      <div class="party-title" id="partyTitle">Совместный просмотр</div>
      <div class="party-meta">
        <span class="party-status" id="partyStatus">
          <i class="fas fa-circle"></i>
          <span id="partyStatusText">Подключение...</span>
        </span>
        <span class="party-viewers">
          <i class="fas fa-users"></i>
          <span id="partyViewerCount">1</span>
        </span>
        <span class="party-username" id="partyUsername" style="display:none">
          <i class="fas fa-user"></i>
          <span id="partyUsernameText"></span>
        </span>
      </div>
      <div class="party-player-select" id="partyPlayerSelect" style="display:none">
        <span class="party-player-select-label">Плеер:</span>
        <div class="party-player-btns" id="partyPlayerBtns"></div>
      </div>
      <button class="party-copy-btn" id="copyBtn" onclick="copyLink()">
        <i class="fas fa-link"></i>
        <span id="copyBtnText">Скопировать ссылку</span>
      </button>
    </div>

    <div class="party-main">

      <div class="party-player-wrap">
        <div class="party-loading" id="partyLoading">
          <i class="fas fa-circle-notch fa-spin"></i>
        </div>
        <div id="party-player-slot"></div>
        <div class="party-episode-notif" id="partyEpisodeNotif" style="display:none"></div>
        <div class="party-viewer-overlay" id="partyViewerOverlay">
          <span><i class="fas fa-lock"></i> Управляет ведущий</span>
        </div>
        <div class="party-join-overlay" id="partyJoinOverlay">
          <button class="party-join-btn" id="partyJoinBtn">
            <i class="fas fa-play"></i> Начать просмотр
          </button>
        </div>
      </div>

      <div class="party-chat">
        <div class="party-chat-messages" id="partyChatMessages">
          <div class="party-chat-system">Добро пожаловать в совместный просмотр!</div>
        </div>
        <div class="party-chat-input-wrap">
          <input class="party-chat-input" id="partyChatInput" type="text"
                 placeholder="Написать сообщение..." maxlength="200"
                 onkeydown="if(event.key==='Enter') sendMessage()"/>
          <button class="party-chat-send" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>

    </div>

  </div>

  <script src="js/settings.js?v=1775877088"></script>
  <script defer src="js/api.js?v=1775877088"></script>
  <script defer src="https://sync.videoframe2.com/sync-lib.js"></script>
  <script defer src="js/party.js?v=1775877088"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="js/header.js?v=1775877088"></script>
  <script>renderHeader('party')</script>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
