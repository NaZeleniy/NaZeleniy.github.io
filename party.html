<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000"/>
  <title>Совместный просмотр — NaZeleniy</title>
  <link rel="icon" type="image/png" href="img/icons/favicon.png"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"/>
</head>
<body>

  <div class="party-page">

    <div class="party-header">
      <div class="party-title" id="partyTitle">Совместный просмотр</div>
      <div class="party-meta">
        <span class="party-status" id="partyStatus">
          <i class="fas fa-circle"></i>
          <span id="partyStatusText">Подключение...</span>
        </span>
        <span class="party-viewers">
          <i class="fas fa-users"></i>
          <span id="partyViewerCount">1</span>
        </span>
        <span class="party-username" id="partyUsername" style="display:none">
          <i class="fas fa-user"></i>
          <span id="partyUsernameText"></span>
        </span>
      </div>
      <button class="party-copy-btn" id="copyBtn" onclick="copyLink()">
        <i class="fas fa-link"></i>
        <span id="copyBtnText">Скопировать ссылку</span>
      </button>
    </div>

    <div class="party-main">

      <div class="party-player-wrap">
        <div class="party-loading" id="partyLoading">
          <i class="fas fa-circle-notch fa-spin"></i>
        </div>
        <iframe id="vibix-frame" frameborder="0" allowfullscreen></iframe>
        <div class="party-viewer-overlay" id="partyViewerOverlay">
          <span><i class="fas fa-lock"></i> Управляет ведущий</span>
        </div>
        <div class="party-join-overlay" id="partyJoinOverlay">
          <button class="party-join-btn" id="partyJoinBtn">
            <i class="fas fa-play"></i> Начать просмотр
          </button>
        </div>
      </div>

      <div class="party-chat">
        <div class="party-chat-messages" id="partyChatMessages">
          <div class="party-chat-system">Добро пожаловать в совместный просмотр!</div>
        </div>
        <div class="party-chat-input-wrap">
          <input class="party-chat-input" id="partyChatInput" type="text"
                 placeholder="Написать сообщение..." maxlength="200"
                 onkeydown="if(event.key==='Enter') sendMessage()"/>
          <button class="party-chat-send" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i>
          </button>
        </div>
      </div>

    </div>

  </div>

  <script src="js/settings.js?v=1775218963"></script>
  <script defer src="js/api.js?v=1775218963"></script>
  <script defer src="js/party.js?v=1775218963"></script>
</body>
</html>
