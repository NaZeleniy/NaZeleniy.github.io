<body x-data="app()" x-init="init()">

  <div class="bg-poster"
       :style="bgPoster ? 'background-image: url(' + bgPoster + ')' : ''"
       :class="{ visible: bgPoster }"></div>

  <div id="app-sidebar"><!--SSR-NAV-START--><!--SSR-NAV-END--></div>
  <div id="auth-btn"></div>

  <main class="main-content">

    <h1 style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);clip-path:inset(50%);white-space:nowrap;border:0">NaZeleniy — поиск фильмов и сериалов онлайн</h1>

    <div id="app-search"></div>

    <!-- Серверный грид популярного для краулеров/без-JS (app.js удаляет [data-ssr-cleanup] при гидрации). -->
    <!--SSR-GRID-START--><!--SSR-GRID-END-->

    <!-- History header -->
    <div x-cloak x-show="!query && !loading && history.length > 0" x-transition>
      <div class="section-header">
        <h2 class="section-title">История просмотров</h2>
        <button class="section-clear-btn" @click="clearHistory()" title="Очистить историю">
          <i class="ph ph-trash"></i>
        </button>
      </div>
    </div>

    <!-- Movie grid -->
    <div class="loading-spinner" x-show="loading" x-transition>
      <i class="fas fa-circle-notch fa-spin"></i>
    </div>

    <div class="grid" x-show="!loading && (movies.length > 0 || (!query && history.length > 0))" x-transition>
      <template x-for="(movie, i) in (!query && history.length > 0 ? history : movies)" :key="movie.kinopoiskId || movie.filmId || i">
        <a class="movie-card" :href="'/movie/' + (movie.kinopoiskId || movie.filmId)"
           @mouseenter="onCardEnter(movie)"
           @click="sessionStorage.setItem('moviePreview', JSON.stringify(movie))">
          <div class="movie-poster-container">
            <img
              class="movie-poster"
              :src="posterFor(movie)"
              :alt="'Постер: ' + (movie.nameRu || movie.nameEn || movie.nameOriginal || 'фильм') + (movie.year ? ', ' + movie.year : '')"
              :loading="i < 8 ? 'eager' : 'lazy'"
              :fetchpriority="i === 0 ? 'high' : 'auto'"
              width="300" height="450"
              x-init="posterInit($el)"
              @load="$el.classList.add('loaded')"
              @error="posterError($el, movie)"
              :class="!(movie.posterUrlPreview || movie.posterUrl) && 'loaded'"
            />
          </div>
          <template x-if="cardRating(movie) > 0">
            <div class="movie-badge-rating" :style="`background:${ratingBg(cardRating(movie))}`">
              <span x-text="cardRating(movie).toFixed(1)"></span>
            </div>
          </template>
          <button class="movie-badge-remove" x-show="movie._isHistory" @click.prevent="removeFromHistory(movie.kinopoiskId)">
            <i class="fas fa-times"></i>
          </button>
          <div class="movie-badge-type" x-text="movieType(movie)"></div>
          <div class="movie-info">
            <h3 class="movie-title" x-text="movie.nameRu || movie.nameEn || movie.nameOriginal || 'Без названия'"></h3>
            <span class="movie-original-title" x-show="origTitle(movie)" x-text="origTitle(movie)"></span>
            <span class="movie-year" x-text="movie.year || ''"></span>
          </div>
        </a>
      </template>
    </div>

    <div class="empty-state" x-show="!loading && movies.length === 0 && searched" x-transition>
      <i class="fas fa-film"></i>
      <p x-text="'Ничего не найдено по запросу «' + query + '»'"></p>
    </div>

    <div class="load-more-spinner" x-show="(_topLoading || _discoverLoading || _searchLoading) && !loading" x-cloak x-transition>
      <i class="fas fa-circle-notch fa-spin"></i>
    </div>

    <div id="scroll-sentinel"></div>

  </main>

  <script src="js/header.js?v=1783944235"></script>
