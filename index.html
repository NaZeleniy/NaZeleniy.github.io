<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#000000"/>
  <title>NaZeleniy — Поиск фильмов</title>
  <link rel="icon" type="image/png" href="img/icons/favicon.png"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous"/>
  <script src="js/settings.js"></script>
  <script src="js/history.js"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()">

  <div class="bg-poster"
       :style="bgPoster ? 'background-image: url(' + bgPoster + ')' : ''"
       :class="{ visible: bgPoster }"></div>

  <div id="app-sidebar"></div>

  <main class="main-content">

    <div id="app-search"></div>

    <!-- History -->
    <div x-show="!query && !loading && history.length > 0" x-transition>
      <div class="section-header">
        <h2 class="section-title">История просмотров</h2>
        <button class="section-clear-btn" @click="clearHistory()" title="Очистить историю">
          <i class="fas fa-trash-alt"></i>
        </button>
      </div>
      <div class="grid">
        <template x-for="movie in history" :key="movie.kinopoiskId">
          <a class="movie-card" :href="'movie.html?id=' + movie.kinopoiskId"
             @mouseenter="onCardEnter(movie)"
             @click="sessionStorage.setItem('moviePreview', JSON.stringify(movie))">
            <div class="movie-poster-container">
              <img
                class="movie-poster"
                :src="posterUrl(movie.posterUrlPreview || movie.posterUrl)"
                :alt="movie.nameRu || movie.nameEn || 'Постер'"
                loading="lazy"
                @load="$el.style.opacity = 1"
                style="opacity:0; transition: opacity 0.6s ease-in-out"
              />
            </div>
            <div class="movie-badge-rating" x-show="movie.ratingKinopoisk > 0">
              <i class="fas fa-star"></i>
              <span x-text="(movie.ratingKinopoisk || 0).toFixed(1)"></span>
            </div>
            <button class="movie-badge-remove" @click.prevent="removeFromHistory(movie.kinopoiskId)">
              <i class="fas fa-times"></i>
            </button>
            <div class="movie-badge-type" x-text="movieType(movie)"></div>
            <div class="movie-info">
              <h3 class="movie-title" x-text="movie.nameRu || movie.nameEn || 'Без названия'"></h3>
              <span class="movie-year" x-text="movie.year || ''"></span>
            </div>
          </a>
        </template>
      </div>
    </div>

    <!-- Movie grid -->
    <div class="loading-spinner" x-show="loading" x-transition>
      <i class="fas fa-circle-notch fa-spin"></i>
    </div>

    <div class="grid" x-show="!loading && movies.length > 0" x-transition>
      <template x-for="(movie, i) in movies" :key="movie.kinopoiskId || movie.filmId || i">
        <a class="movie-card" :href="'movie.html?id=' + (movie.kinopoiskId || movie.filmId)"
           @mouseenter="onCardEnter(movie)"
           @click="sessionStorage.setItem('moviePreview', JSON.stringify(movie))">
          <div class="movie-poster-container">
            <img
              class="movie-poster"
              :src="posterUrl(movie.posterUrlPreview || movie.posterUrl)"
              :alt="movie.nameRu || movie.nameEn || 'Постер'"
              loading="lazy"
              @load="$el.style.opacity = 1"
              style="opacity:0; transition: opacity 0.6s ease-in-out"
            />
          </div>
          <div class="movie-badge-rating" x-show="movie.ratingKinopoisk > 0">
            <i class="fas fa-star"></i>
            <span x-text="(movie.ratingKinopoisk || 0).toFixed(1)"></span>
          </div>
          <div class="movie-badge-type" x-text="movieType(movie)"></div>
          <div class="movie-info">
            <h3 class="movie-title" x-text="movie.nameRu || movie.nameEn || 'Без названия'"></h3>
            <span class="movie-year" x-text="movie.year || ''"></span>
          </div>
        </a>
      </template>
    </div>

    <div class="empty-state" x-show="!loading && movies.length === 0 && query" x-transition>
      <i class="fas fa-film"></i>
      <p x-text="'Ничего не найдено по запросу «' + query + '»'"></p>
    </div>

    <div id="scroll-sentinel"></div>

  </main>

  <script src="js/header.js"></script>
  <script>renderHeader('index')</script>
</body>
</html>
