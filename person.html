<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="/">
  <script>
    // GitHub Pages отдаёт /person/{id} через redirect 404.html → /person.html?id={id}
    // (404.html — movie-shell). Синхронно (до header.js → canonical) возвращаем
    // чистый URL /person/{id} в адресную строку, чтобы было как у /movie/{id}.
    // На Go-бэкенде путь уже чистый — no-op.
    (function () {
      var id = new URLSearchParams(location.search).get('id')
      if (id && !/\/person\/\d+/.test(location.pathname)) {
        try { history.replaceState(null, '', '/person/' + id) } catch (e) {}
      }
    })()
  </script>

  <script defer src="js/alpine.min.js?v=1782641552"></script>

<body x-data="personPage()" x-init="init()">

  <div class="bg-poster"
       :style="bgPhoto ? 'background-image: url(' + bgPhoto + ')' : ''"
       :class="{ visible: bgPhoto }"></div>

  <div id="app-sidebar"></div>

  <main class="main-content person-wrap">

    <!-- ── Загрузка ─────────────────────────────────────── -->
    <div class="loading-spinner person-loading" x-show="loading" x-transition>
      <i class="ph ph-circle-notch nz-spin"></i>
    </div>

    <!-- ── Ошибка ───────────────────────────────────────── -->
    <div class="empty-state" x-show="!loading && !person" x-transition>
      <i class="ph ph-user-circle-dashed"></i>
      <p x-text="loadError || 'Персона не найдена'"></p>
      <a href="/" class="person-back"><i class="ph ph-arrow-left"></i> На главную</a>
    </div>

    <!-- ── Контент ──────────────────────────────────────── -->
    <template x-if="!loading && person">
      <div>

        <button type="button" class="person-back person-back-top" @click="goBack()">
          <i class="ph ph-arrow-left"></i> Назад
        </button>

        <!-- HERO -->
        <header class="person-hero">

          <div class="person-photo-col">
            <div class="person-photo">
              <img :src="person.photo_url || 'img/placeholder.svg'" :alt="displayName" @load="$el.classList.add('loaded')" @error="$el.src='img/placeholder.svg'; $el.classList.add('loaded')">
            </div>
            <div class="person-quick" x-show="person.instagram || person.homepage">
              <a class="person-link" x-show="person.instagram" :href="'https://instagram.com/' + person.instagram" target="_blank" rel="noopener">
                <i class="ph ph-instagram-logo"></i> Instagram
              </a>
              <a class="person-link" x-show="person.homepage" :href="person.homepage" target="_blank" rel="noopener">
                <i class="ph ph-globe-simple"></i> Сайт
              </a>
            </div>
          </div>

          <div class="person-main">
            <div class="person-profrow">
              <template x-for="(p, i) in professionLabels" :key="i">
                <span class="person-prof-chip" x-text="p"></span>
              </template>
            </div>

            <h1 class="person-name" x-text="displayName"></h1>
            <div class="person-name-en" x-show="secondaryName" x-text="secondaryName"></div>

            <div class="person-meta">
              <span class="person-meta-item" x-show="person.birth_year">
                <i class="ph ph-cake"></i>
                <span x-text="birthLine"></span>
              </span>
              <span class="person-meta-item" x-show="person.death_year">
                <i class="ph ph-flower-lotus"></i>
                <span x-text="'† ' + person.death_year"></span>
              </span>
              <span class="person-meta-item" x-show="person.birthplace">
                <i class="ph ph-map-pin"></i>
                <span x-text="person.birthplace"></span>
              </span>
              <span class="person-meta-item" x-show="genderLabel">
                <i class="ph ph-gender-intersex"></i>
                <span x-text="genderLabel"></span>
              </span>
            </div>

            <!-- биография -->
            <div class="person-bio" x-show="person.biography">
              <p class="person-bio-text" :class="{ clamped: !bioOpen }" x-text="person.biography"></p>
              <button type="button" class="person-bio-toggle" x-show="bioLong" @click="bioOpen = !bioOpen" x-text="bioOpen ? 'Свернуть' : 'Читать полностью'"></button>
            </div>

            <div class="person-aka" x-show="person.also_known_as && person.also_known_as.length">
              <span class="person-aka-label">Также известен как</span>
              <span x-text="(person.also_known_as || []).join(' · ')"></span>
            </div>
          </div>
        </header>

        <!-- ФИЛЬМОГРАФИЯ -->
        <section class="filmo">
          <div class="filmo-head">
            <h2 class="filmo-title"><i class="ph-fill ph-film-slate"></i> Фильмография</h2>
            <div class="filmo-filters">
              <button type="button" class="filmo-pill" :class="{ active: activeRole === 'all' }" @click="selectRole('all')">
                Все <span class="filmo-pill-n" x-text="totalCredits"></span>
              </button>
              <template x-for="r in roles" :key="r.role">
                <button type="button" class="filmo-pill" :class="{ active: activeRole === r.role }" @click="selectRole(r.role)">
                  <span x-text="roleLabel(r.role)"></span> <span class="filmo-pill-n" x-text="r.count"></span>
                </button>
              </template>
            </div>
          </div>

          <div class="load-more-spinner" x-show="loadingFilmo" x-transition>
            <i class="ph ph-circle-notch nz-spin"></i>
          </div>

          <div class="grid" x-show="!loadingFilmo && visibleCredits.length > 0" x-transition>
            <template x-for="(m, i) in visibleCredits" :key="m._key">
              <a class="movie-card" :href="m.movieId ? '/movie/' + m.movieId : '#'"
                 @mouseenter="onCardEnter(m)"
                 @click="m.movieId && sessionStorage.setItem('moviePreview', JSON.stringify(m))">
                <div class="movie-poster-container">
                  <img class="movie-poster" :src="posterFor(m)" :alt="cardTitle(m)" loading="lazy" @load="$el.classList.add('loaded')" @error="$el.src='img/placeholder.svg'; $el.classList.add('loaded')">
                </div>
                <template x-if="ratingOf(m).value > 0">
                  <div class="movie-badge-rating" :style="`background:${ratingBg(ratingOf(m).value)}`">
                    <span x-text="ratingOf(m).value.toFixed(1)"></span>
                  </div>
                </template>
                <div class="movie-badge-type" x-text="typeLabel(m.kind)"></div>
                <div class="movie-info">
                  <h3 class="movie-title" x-text="cardTitle(m)"></h3>
                  <span class="movie-card-role" x-show="cardRole(m)" x-text="cardRole(m)"></span>
                  <span class="movie-year" x-text="m.year || ''"></span>
                </div>
              </a>
            </template>
          </div>

          <div class="empty-state" x-show="!loadingFilmo && visibleCredits.length === 0" x-transition>
            <i class="ph ph-film-strip"></i>
            <p>Нет работ в этой категории</p>
          </div>
        </section>

      </div>
    </template>

  </main>

  <script src="js/header.js?v=1782641552"></script>
  <script>renderHeader('person')</script>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
