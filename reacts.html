<body x-data="reactsApp()">

  <div id="app-sidebar"></div>

  <main class="main-content">
    <div class="reacts-page">

      <div class="reacts-header">
        <svg class="reacts-title-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path
            d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z" />
        </svg>
        <h1 class="reacts-title">Telegram каналы с реакциями</h1>
      </div>

      <div class="reacts-search-wrap">
        <i class="fas fa-search reacts-search-icon"></i>
        <input type="text" class="reacts-search" placeholder="Поиск по нику..." x-model="search" autocomplete="off"
          spellcheck="false" />
      </div>

      <div class="reacts-notice-wrap">
        <div class="reacts-notice">
          <i class="fas fa-circle-info"></i>
          Знаете ресурс, которого здесь нет?
          <a href="https://t.me/NaZelen1y?direct" target="_blank" rel="noopener noreferrer">Напишите нам</a>
        </div>
      </div>

      <!-- Grid -->
      <div class="reacts-grid" x-show="filtered.length > 0">
        <template x-for="s in filtered" :key="s.nick">
          <div class="reacts-card">

            <!-- Avatar + Twitch badge -->
            <div class="reacts-avatar-wrap">
              <div class="reacts-avatar-skeleton" x-show="!avatarReady(s.nick)"></div>
              <img class="reacts-avatar" :src="avatarSrc(s.nick) || '/img/placeholder.svg'"
                :style="!avatarReady(s.nick) ? 'opacity:0' : 'opacity:1'" :alt="s.nick"
                @error="$el.src='/img/placeholder.svg'" />
              <a :href="twitchUrl(s.nick)" target="_blank" rel="noopener noreferrer" class="reacts-twitch-badge"
                title="Twitch">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path
                    d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z" />
                </svg>
              </a>
            </div>

            <!-- Nick -->
            <div class="reacts-nick" x-text="s.nick"></div>

            <!-- Source buttons -->
            <div class="reacts-btns">
              <template x-for="(src, i) in s.sources" :key="i">
                <a :href="src.url" target="_blank" rel="noopener noreferrer" :class="srcClass(src.url)">
                  <img x-show="srcAvatar(src.url)" :src="srcAvatar(src.url) || ''" class="reacts-src-avatar"
                    @error="$el.style.display='none'" alt="" />
                  <span x-show="!srcAvatar(src.url)" class="reacts-btn-icon" x-html="srcIcon(src.url)"></span>
                  <span class="reacts-btn-label" x-text="srcName(src.url)"></span>
                </a>
              </template>
            </div>

          </div>
        </template>
      </div>

      <!-- Empty state -->
      <div class="reacts-empty" x-show="filtered.length === 0" x-cloak>
        <i class="fas fa-search"></i>
        <p>Ничего не найдено</p>
      </div>

    </div>
  </main>

  <script src="js/header.js?v=1776866647"></script>
  <script>renderHeader('reacts')</script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js')</script>
</body>

</html>
