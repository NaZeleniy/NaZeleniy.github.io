<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="js/version.js?v=1776223101"></script>
  <meta charset="UTF-8"/>
  <link rel="dns-prefetch" href="https://nazeleniy.site">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#000000"/>
  <title>Войти — NaZeleniy</title>
  <link rel="icon" type="image/png" href="img/icons/favicon.png"/>
  <link rel="preload" href="css/style.css?v=1776223101" as="style">
  <link rel="stylesheet" href="css/style.css?v=1776223101"/>
  <link rel="preload" href="css/icons.css?v=1776223101" as="style">
  <link rel="stylesheet" href="css/icons.css?v=1776223101"/>
</head>
<body>

  <div id="app-sidebar"></div>

  <script src="js/api.js?v=1776223101"></script>
  <script src="js/header.js?v=1776223101"></script>
  <script>renderHeader('login')</script>

  <script>
    function _nextUrl() {
      const raw = new URLSearchParams(location.search).get('next') || '/'
      try {
        const u = new URL(raw, location.origin)
        return u.origin === location.origin ? u.pathname + u.search : '/'
      } catch { return '/' }
    }

    // Если уже залогинен — сразу редиректим
    try {
      const cached = localStorage.getItem('nz_me')
      if (cached) {
        const { data } = JSON.parse(cached)
        if (data) { location.replace(_nextUrl()); }
      }
    } catch {}

    // После входа через модалку — редиректим на ?next=
    document.addEventListener('nz:auth-success', () => location.replace(_nextUrl()), { once: true })

    // Открываем модалку как только она готова
    function _tryOpen() {
      if (typeof openAuthModal === 'function') {
        openAuthModal()
      } else {
        setTimeout(_tryOpen, 50)
      }
    }
    _tryOpen()
  </script>

  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
