<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="js/version.js?v=1776223693"></script>
  <meta charset="UTF-8"/>
  <link rel="dns-prefetch" href="https://nazeleniy.site">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#000000"/>
  <title>Войти — NaZeleniy</title>
  <link rel="icon" type="image/png" href="img/icons/favicon.png"/>
  <link rel="preload" href="css/style.css?v=1776223693" as="style">
  <link rel="stylesheet" href="css/style.css?v=1776223693"/>
  <link rel="preload" href="css/icons.css?v=1776223693" as="style">
  <link rel="stylesheet" href="css/icons.css?v=1776223693"/>
  <script defer src="js/alpine.min.js?v=1776223693"></script>
</head>
<body>

  <div id="app-sidebar"></div>

  <script src="js/api.js?v=1776223693"></script>
  <script src="js/header.js?v=1776223693"></script>
  <script>renderHeader('login')</script>

  <script>
    var _LOGIN_CACHE_TTL = 15 * 60 * 1000 // должен совпадать с auth.js

    function _nextUrl() {
      var raw = new URLSearchParams(location.search).get('next') || '/'
      try {
        var u = new URL(raw, location.origin)
        return u.origin === location.origin ? u.pathname + u.search : '/'
      } catch (e) { return '/' }
    }

    // Если уже залогинен (кеш свежий) — сразу редиректим, не показывая модалку
    try {
      var _cached = localStorage.getItem('nz_me')
      if (_cached) {
        var _parsed = JSON.parse(_cached)
        if (_parsed.data && _parsed.ts && (Date.now() - _parsed.ts < _LOGIN_CACHE_TTL)) {
          location.replace(_nextUrl())
        }
      }
    } catch (e) {}

    // После входа через модалку — редиректим на ?next=
    document.addEventListener('nz:auth-success', function () {
      location.replace(_nextUrl())
    }, { once: true })

    // Открываем модалку как только она готова
    // Лимит 60 попыток = 3 секунды; если не загрузилась — не блокируем пользователя
    var _tryOpenAttempts = 0
    function _tryOpen() {
      if (typeof openAuthModal === 'function') {
        openAuthModal()
      } else if (_tryOpenAttempts < 60) {
        _tryOpenAttempts++
        setTimeout(_tryOpen, 50)
      }
    }
    _tryOpen()
  </script>

  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js')</script>
</body>
</html>
